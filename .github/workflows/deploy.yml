name: Deploy to Cloudflare Pages

on:
  workflow_run:
    workflows: ["test"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Gleam
        uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          gleam-version: "1.14.0"
          rebar3-version: "3"

      - name: Cache Gleam packages
        uses: actions/cache@v5
        with:
          path: build/packages
          key: gleam-packages-${{ hashFiles('manifest.toml') }}

      - name: Cache lustre binaries
        uses: actions/cache@v5
        with:
          path: .lustre/bin
          key: lustre-bin-${{ runner.os }}-${{ hashFiles('manifest.toml') }}

      - name: Download dependencies
        run: gleam deps download

      - name: Build
        run: gleam run -m lustre/dev -- build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=${{ vars.CLOUDFLARE_PROJECT_NAME || 'nyowa-2026' }}
